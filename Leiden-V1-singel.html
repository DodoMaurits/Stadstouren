<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Varen 8km Gouden Singelroute</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">

        <a href="leiden-vaarroutes.html" class="back-button">Terug</a>

    <div id="startOverlayContainer"></div>
