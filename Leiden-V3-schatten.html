<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Varen 10km Hidden Gems</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">

        <a href="leiden-vaarroutes.html" class="back-button">Terug</a>
        
        <h1>Varen 10km Hidden Gems</h1>
        
        <p>Kies een scenario om te starten:<button id="infoBtn" class="info-button" aria-label="Informatie">i</button></p>

        <div class="grid">
            <div class="grid-item" data-opt="Leiden-V3-schatten-pt.html">
                <div class="number">1</div>
                <div class="title">Puzzeltocht</div>
            </div>
            <div class="grid-item" data-opt="Leiden-V3-schatten-mm.html">
                <div class="number">2</div>
                <div class="title">Moordmysterie</div>
            </div>
            <div class="grid-item" data-opt="Leiden-V3-schatten-sj.html">
                <div class="number">3</div>
                <div class="title">Schattenjacht</div>
            </div>
            <div class="grid-item" data-opt="Leiden-V3-schatten-tr.html">
                <div class="number">4</div>
                <div class="title">Tijdreiziger</div>
            </div>
        </div>
    </div>
    
    <div id="overlay" class="overlay" aria-hidden="true">
        <div class="modal">
            <button id="modalClose" class="modal-close">✕</button>
            <h2>Kies jouw avontuur!</h2>
            <p>Je staat op het punt deze route te starten.</p>
            <div class="modal-buttons">
                <a id="confirmBtn" class="modal-btn" href="#">Start avontuur</a>
            </div>
        </div>
    </div>

    <button id="infoBtn" class="info-button" aria-label="Informatie">i</button>

    <script src="script.js"></script>
    
</body>
</html>
